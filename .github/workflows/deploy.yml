name: Deploy Financial Tracker Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-legacy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate Firebase build variables
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
        run: |
          missing=0

          if [ -z "$VITE_FIREBASE_API_KEY" ]; then
            echo "::error title=Missing GitHub Actions variable::VITE_FIREBASE_API_KEY is not set"
            missing=1
          fi
          if [ -z "$VITE_FIREBASE_AUTH_DOMAIN" ]; then
            echo "::error title=Missing GitHub Actions variable::VITE_FIREBASE_AUTH_DOMAIN is not set"
            missing=1
          fi
          if [ -z "$VITE_FIREBASE_PROJECT_ID" ]; then
            echo "::error title=Missing GitHub Actions variable::VITE_FIREBASE_PROJECT_ID is not set"
            missing=1
          fi
          if [ -z "$VITE_FIREBASE_STORAGE_BUCKET" ]; then
            echo "::error title=Missing GitHub Actions variable::VITE_FIREBASE_STORAGE_BUCKET is not set"
            missing=1
          fi
          if [ -z "$VITE_FIREBASE_MESSAGING_SENDER_ID" ]; then
            echo "::error title=Missing GitHub Actions variable::VITE_FIREBASE_MESSAGING_SENDER_ID is not set"
            missing=1
          fi
          if [ -z "$VITE_FIREBASE_APP_ID" ]; then
            echo "::error title=Missing GitHub Actions variable::VITE_FIREBASE_APP_ID is not set"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build legacy Pages site
        run: npm run build:pages
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
